version: 1
project:
  title: Battlefield Tours
  description: A blog about my tours of the Battlefields.
  # thumbnail: images/profile-thumbnail.webp
  # authors:
  #   - name: Paul Allen
  #     email: pd-allen@rogers.com
  #     orcid: 0000-0000-0000-0000
  #     url: https://pd-allen.github.com/battletor/
  #     affiliations:
  #       - Example University
  copyright: '2026'
  keywords:
    - Blog
    - Data Science
    - Open-source Software
  github: pd-allen/battletour
  exclude:
    - _build
    - Thumbs.db
    - .DS_Store
    - '**.ipynb_checkpoints'
    - generate_rss.py
    - inject_comments.py
    - rss.xml
    - atom.xml
    - fonts/**
    - CONDUCT.md
    - CONTRIBUTING.md
    - README.md
  toc:
    - file: index.md
    - file: tags/worldwarone.md
    - file: tags/worldwartwo.md
    - file: tags/travel.md
    - file: contact.md
    - pattern: posts/*.md
      hidden: true
site:
  options:
    logo: logo.png
    logo_dark: logo.png
    favicon: fav.ico
    style: custom.css
    # analytics_google: G-XXXXXXXXXX
    folders: true
  actions:
    - title: RSS
      url: https://pd-allen.github.io/battletour/rss.xml
  template: book-theme
  parts:
    primary_sidebar_footer: ''
    footer: |
      [GitHub](https://pd-allen/github.io/battletour) |
      
